<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Navbar Demo</title>
  <link rel="stylesheet" href="more-research-custom.css">
</head>

<body>
<div id="more-research"></div>
<script>
  fetch('more-research.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('more-research').innerHTML = data;
    });
</script>
</body>
</html>
